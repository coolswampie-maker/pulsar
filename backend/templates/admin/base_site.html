{% extends "admin/base.html" %}

{% block title %}{{ title }} | ПУЛЬСАР — оператор{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">
    <svg viewBox="0 0 40 40" width="22" height="22" aria-hidden="true" style="vertical-align:-5px;margin-right:7px">
      <g transform="rotate(-28 20 20)">
        <ellipse cx="20" cy="20" rx="11.5" ry="4.6" fill="none" stroke="#cfe0f0" stroke-width="1.7" opacity=".5"/>
        <path d="M20 16.4 L17.6 3 L22.4 3 Z" fill="#CBA968"/>
        <path d="M20 23.6 L17.6 37 L22.4 37 Z" fill="#CBA968"/>
        <circle cx="20" cy="20" r="3.6" fill="#fff"/>
      </g>
    </svg>ПУЛЬСАР <span style="font-weight:400;color:#9db4cc;font-size:13px">· оператор</span>
  </a>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
html[data-theme="light"], html[data-theme="dark"], :root{
  --primary:#0E2A47; --secondary:#0E2A47; --accent:#9C7638;
  --primary-fg:#fff;
  --header-color:#cfe0f0; --header-branding-color:#fff;
  --header-bg:linear-gradient(90deg,#0E2A47,#0A1E33); --header-link-color:#fff;
  --breadcrumbs-fg:#5a6675; --breadcrumbs-link-fg:#0E2A47; --breadcrumbs-bg:#eef2f6;
  --link-fg:#124a7a; --link-hover-color:#9C7638; --link-selected-fg:#0E2A47;
  --button-bg:#9C7638; --button-fg:#fff; --button-hover-bg:#856831;
  --default-button-bg:#0E2A47; --default-button-hover-bg:#0A1E33;
  --object-tools-bg:#0E2A47; --object-tools-fg:#fff;
  --object-tools-hover-bg:#9C7638;
  --selected-row:#f3ecdf; --selected-bg:#f6f8fa;
  --message-success-bg:#e7f0ea;
}
#site-name a{color:#fff;font-weight:800;letter-spacing:.04em}
div.breadcrumbs{font-size:12.5px}
.module h2, .module caption, .inline-group h2{background:#334b63;letter-spacing:.02em}
#header{background:linear-gradient(90deg,#0E2A47,#0A1E33)!important;box-shadow:0 2px 10px rgba(10,30,51,.18)}
.object-tools a, .object-tools a:link, .object-tools a:visited{background:#0E2A47}
.object-tools a:hover, .object-tools a:focus{background:#9C7638}
a.button, .button, input[type=submit], .submit-row input[type=submit]{background:#9C7638}
.submit-row input.default{background:#0E2A47}
.button, input[type=submit], input[type=button], .submit-row input, a.button{border-radius:7px}
.object-tools a{border-radius:16px}
.calendarbox, .clockbox{z-index:1}
</style>
{% endblock %}

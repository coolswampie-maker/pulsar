{% extends "admin/base.html" %}

{% block title %}{{ title }} | ПУЛЬСАР — оператор{% endblock %}

{% block extrahead %}{{ block.super }}
<script>
// Инлайн-кнопки Django строит через JS в именительном падеже
// («Добавить ещё один Позиция заявки») — правим на нормальный вид.
window.addEventListener('load', function () {
  document.querySelectorAll('.add-row a, a.add-handler').forEach(function (a) {
    if (/ещ[её] один Позиция заявки/i.test(a.textContent)) a.textContent = 'Добавить позицию заявки';
  });
});
</script>
{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">
    <svg viewBox="0 0 40 40" width="22" height="22" aria-hidden="true" style="vertical-align:-5px;margin-right:7px">
      <g transform="rotate(-28 20 20)">
        <ellipse cx="20" cy="20" rx="11.5" ry="4.6" fill="none" stroke="#cfe0f0" stroke-width="1.7" opacity=".5"/>
        <path d="M20 16.4 L17.6 3 L22.4 3 Z" fill="#CBA968"/>
        <path d="M20 23.6 L17.6 37 L22.4 37 Z" fill="#CBA968"/>
        <circle cx="20" cy="20" r="3.6" fill="#fff"/>
      </g>
    </svg>ПУЛЬСАР <span style="font-weight:400;color:#9db4cc;font-size:13px">· оператор</span>
  </a>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
html[data-theme="light"], html[data-theme="dark"], :root{
  --primary:#0E2A47; --secondary:#0E2A47; --accent:#9C7638;
  --primary-fg:#fff;
  --header-color:#cfe0f0; --header-branding-color:#fff;
  --header-bg:linear-gradient(90deg,#0E2A47,#0A1E33); --header-link-color:#fff;
  --breadcrumbs-fg:#5a6675; --breadcrumbs-link-fg:#0E2A47; --breadcrumbs-bg:#eef2f6;
  --link-fg:#124a7a; --link-hover-color:#9C7638; --link-selected-fg:#0E2A47;
  --button-bg:#9C7638; --button-fg:#fff; --button-hover-bg:#856831;
  --default-button-bg:#0E2A47; --default-button-hover-bg:#0A1E33;
  --object-tools-bg:#0E2A47; --object-tools-fg:#fff;
  --object-tools-hover-bg:#9C7638;
  --selected-row:#f3ecdf; --selected-bg:#f6f8fa;
  --message-success-bg:#e7f0ea;
}
#site-name a{color:#fff;font-weight:800;letter-spacing:.04em}
div.breadcrumbs{font-size:12.5px}
.module h2, .module caption, .inline-group h2{background:#334b63;letter-spacing:.02em}
#header{background:linear-gradient(90deg,#0E2A47,#0A1E33)!important;box-shadow:0 2px 10px rgba(10,30,51,.18)}
.object-tools a, .object-tools a:link, .object-tools a:visited{background:#0E2A47}
.object-tools a:hover, .object-tools a:focus{background:#9C7638}
a.button, .button, input[type=submit], .submit-row input[type=submit]{background:#9C7638}
.submit-row input.default{background:#0E2A47}
.button, input[type=submit], input[type=button], .submit-row input, a.button{border-radius:7px}
.object-tools a{border-radius:16px}
.calendarbox, .clockbox{z-index:1}
/* Контент — на всю ширину экрана (Django по умолчанию сужает #content) */
#content{width:auto!important;max-width:none!important;margin-right:0!important;box-sizing:border-box;flex:1 1 auto;padding:22px 40px 60px}
#content-main{float:none;width:auto}
/* Дашборд: слева разделы во всю ширину, справа — «Последние действия» */
.dashboard #content{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:32px;align-items:start}
.dashboard #content-main,.dashboard #content-related{float:none;width:auto;margin:0}
.dashboard #content-main{grid-column:1}
.dashboard #content-related{grid-column:2}
.dashboard .module table{width:100%}
/* Дашборд: разделы как карточки с иконками */
.pulsar-section{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#8a97a5;margin:2px 0 15px}
.pulsar-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;margin-bottom:8px}
.pcard{background:#fff;border:1px solid #e3e8ee;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .16s,transform .16s,border-color .16s;box-shadow:0 1px 2px rgba(14,42,71,.04)}
.pcard:hover{box-shadow:0 12px 30px rgba(14,42,71,.13);transform:translateY(-2px);border-color:#cbd5e1}
.pcard-main{display:block;padding:22px 22px 18px;text-decoration:none;color:inherit;flex:1}
.pcard-ic{display:inline-flex;width:48px;height:48px;align-items:center;justify-content:center;border-radius:13px;background:linear-gradient(135deg,#0E2A47,#12365a);margin-bottom:15px}
.pcard-ic svg{width:25px;height:25px;stroke:#CBA968;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.pcard-title{display:block;font-size:17px;font-weight:700;color:#0E2A47;margin-bottom:6px}
.pcard-desc{display:block;font-size:13px;line-height:1.45;color:#68727f}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 22px;border-top:1px solid #eef2f6;background:#fafbfc}
.pcard-foot a{text-decoration:none;font-size:13px;font-weight:600}
.pcard-open{color:#124a7a}
.pcard-open:hover{color:#0E2A47}
.pcard-add{color:#856831;background:#f4ecdc;padding:5px 12px;border-radius:8px;white-space:nowrap}
.pcard-add:hover{background:#ece0c6;color:#6f561f}
@media (max-width:1024px){.dashboard #content{grid-template-columns:1fr}}
</style>
{% endblock %}

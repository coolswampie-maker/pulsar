{% extends "admin/base_site.html" %}

{% block extrastyle %}{{ block.super }}<style>{{ gantt_css }}</style>{% endblock %}

{% block breadcrumbs %}
<div class="breadcrumbs">
  <a href="{% url 'admin:index' %}">Начало</a>
  › <a href="{% url 'admin:app_list' app_label='booking' %}">Бронирование и каталог</a>
  › Календарь занятости
</div>
{% endblock %}

{% block content %}
<div id="content-main">
  <div id="gantt" data-api="{{ api_url }}" data-csrf="{{ csrf_token }}"
       data-ds="{{ ds }}" data-de="{{ de }}" style="--hstep:{{ hstep }}">
    <div class="sub">{{ sub }}</div>
    <div class="pager">{{ pager }}</div>
    <div class="filters">{{ filters }}</div>
    <div class="wrap"><table><thead><tr>{{ thead }}</tr></thead><tbody>{{ rows }}</tbody></table></div>
    <div class="legend">{{ legend }}</div>
  </div>
</div>
<div id="toast"></div><div id="ov"></div>
<script>{{ gantt_js }}</script>
{% endblock %}
